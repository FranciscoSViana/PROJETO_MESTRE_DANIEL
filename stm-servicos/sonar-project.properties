# ============================================================
# SonarCloud — stm-servicos
# ============================================================
# ATENÇÃO: substitua os valores abaixo com os dados do seu projeto no SonarCloud
# Crie um secret SONAR_TOKEN no GitHub com o token de autenticação
# ============================================================

sonar.projectKey=SONAR_PROJECT_KEY
sonar.organization=SONAR_ORGANIZATION
sonar.projectName=STM Serviços

sonar.sources=src/main/java
sonar.tests=src/test/java

sonar.java.source=21
sonar.java.target=21

# Relatório de cobertura gerado pelo JaCoCo
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Exclusões — modelos, DTOs, config e ponto de entrada
sonar.exclusions=\
  **/StmServicosApplication.java,\
  **/api/model/input/**,\
  **/api/model/output/**,\
  **/common/config/**,\
  **/domain/model/enums/**,\
  **/domain/model/Cidade.java,\
  **/domain/model/Pedagio.java,\
  **/domain/model/ControleFaturamento.java,\
  **/domain/model/NotificacaoUsuario.java

# Exclusões de cobertura
sonar.coverage.exclusions=\
  **/StmServicosApplication.java,\
  **/api/model/**,\
  **/domain/model/enums/**,\
  **/common/config/**

# Encoding
sonar.sourceEncoding=UTF-8
