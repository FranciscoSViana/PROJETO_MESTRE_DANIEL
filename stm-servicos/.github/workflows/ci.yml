name: CI — STM Serviços

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Permissões para criar tags e releases
permissions:
  contents: write
  pull-requests: read

jobs:
  # ============================================================
  # JOB 1: Testes Unitários + JaCoCo + SonarCloud Quality Gate
  # ============================================================
  unit-tests:
    name: Testes Unitários + SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud precisa do histórico completo

      - name: Configurar Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Permissão ao gradlew
        run: chmod +x gradlew

      - name: Executar testes unitários e gerar relatório JaCoCo
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Upload resultados dos testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 7

      - name: Upload relatório JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/
          retention-days: 7

      - name: Análise SonarCloud — Quality Gate
        run: ./gradlew sonar --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  # ============================================================
  # JOB 2: Testes E2E (Cucumber + Testcontainers)
  # Roda somente em push para develop ou main, nunca em PRs
  # ============================================================
  e2e-tests:
    name: Testes E2E (Cucumber)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Permissão ao gradlew
        run: chmod +x gradlew

      - name: Executar testes E2E (Testcontainers + Docker)
        run: ./gradlew e2eTest --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: e2e

      - name: Upload relatório Cucumber
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cucumber-report
          path: build/reports/cucumber/
          retention-days: 7

  # ============================================================
  # JOB 3: Criar tag de versão (somente em push para develop)
  # ============================================================
  create-tag:
    name: Criar tag de versão
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calcular próxima versão (incrementa patch)
        id: versao
        run: |
          # Pega a última tag, se não existir começa do v0.0.0
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Última tag encontrada: $LAST_TAG"

          # Remove o 'v' e extrai major.minor.patch
          VERSION=${LAST_TAG#v}
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Incrementa o patch
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"

          echo "Nova tag: $NEW_TAG"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Criar e publicar tag no repositório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.versao.outputs.tag }}" -m "Release ${{ steps.versao.outputs.tag }}"
          git push origin "${{ steps.versao.outputs.tag }}"
          echo "Tag ${{ steps.versao.outputs.tag }} criada com sucesso!"

  # ============================================================
  # JOB 4: Criar GitHub Release na main usando a última tag
  # Roda somente em push para main (merge do develop)
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pegar última tag criada no develop
        id: tag
        run: |
          # Busca a última tag que chegou via merge do develop
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "Tag para release: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          make_latest: true
