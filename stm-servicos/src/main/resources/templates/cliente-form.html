<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastro de Cliente</title>
</head>
<body>

<h2>Cadastrar Cliente</h2>

<p th:if="${mensagem}" th:text="${mensagem}" style="color: green"></p>

<form action="/clientes/salvar" method="post">

    <label>CNPJ:</label>
    <input type="text" id="cnpj" name="cnpj" th:value="${cliente.cnpj}">
    <span id="loading" style="display:none; color: blue;">Buscando...</span>
    <br><br>

    <label>Razão Social:</label>
    <input type="text" id="razaoSocial" name="razaoSocial" th:value="${cliente.razaoSocial}" readonly><br><br>

    <label>Contrato:</label>
    <input type="text" name="contrato" th:value="${cliente.contrato}"><br><br>

    <label>Nome:</label>
    <input type="text" name="nome" th:value="${cliente.nome}"><br><br>

    <label>Valor Chamado:</label>
    <input type="number" step="0.1" name="valorChamado" th:value="${cliente.valorChamado}"><br><br>

    <label>Valor KM:</label>
    <input type="number" step="0.1" name="valorKm" th:value="${cliente.valorKm}"><br><br>

    <label>Inscrição Estadual:</label>
    <input type="text" name="inscricaoEstadual" th:value="${cliente.inscricaoEstadual}"><br><br>

    <button type="submit">Salvar</button>
</form>

<script>
    console.log("JS carregado!");

    // ==========================
    // Variáveis declaradas 1 vez
    // ==========================
    const cnpjInput = document.getElementById("cnpj");
    const loading = document.getElementById("loading");
    const razaoSocialInput = document.getElementById("razaoSocial");

    console.log("Campo CNPJ encontrado?", cnpjInput);
    console.log("Campo Razão encontrado?", razaoSocialInput);

    let timeout = null;

    // ==========================
    // Função única para consulta
    // ==========================
    function consultarCnpj(cnpj) {
        loading.style.display = "inline";

        fetch(`/api/clientes/cnpj/${cnpj}`)
            .then(response => {
                if (!response.ok) throw new Error("Erro na consulta");
                return response.json();
            })
            .then(data => {
                console.log("Resposta da API:", data);
                razaoSocialInput.value = data.razao_social || "";
            })
            .catch((e) => {
                console.error("Erro:", e);
                razaoSocialInput.value = "";
                alert("Erro ao consultar CNPJ!");
            })
            .finally(() => {
                loading.style.display = "none";
            });
    }

    // ==========================
    // Evento de digitação
    // ==========================
    cnpjInput.addEventListener("input", function () {
        clearTimeout(timeout);

        const cnpj = cnpjInput.value.replace(/\D/g, "");

        timeout = setTimeout(() => {
            if (cnpj.length === 14) {
                consultarCnpj(cnpj);
            }
        }, 600);
    });
</script>

</body>
</html>
