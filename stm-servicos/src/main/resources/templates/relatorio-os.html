<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR" xml:lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Relatório de Ordens de Serviço</title>
    <style>
        body { font-family: Arial, sans-serif; font-size: 9px; margin: 20px; }
        h1   { font-size: 14px; text-align: center; margin-bottom: 12px; color: #003366; }
        table { width: 100%; border-collapse: collapse; }
        th   { background-color: #003366; color: white; padding: 5px 4px;
            text-align: left; font-size: 8px; }
        td   { padding: 4px; border-bottom: 1px solid #ddd; font-size: 8px; }
        tr:nth-child(even) td { background-color: #f0f4ff; }
        .badge { padding: 2px 6px; border-radius: 3px; font-weight: bold; font-size: 7px; }
        .ABERTA    { background:#e3f2fd; color:#1565c0; }
        .CONCLUIDA { background:#e8f5e9; color:#2e7d32; }
        .CANCELADA { background:#fce4ec; color:#c62828; }
        .footer { margin-top: 10px; font-size: 7px; color: #888; text-align: right; }
    </style>
</head>
<body>

<h1>Relatório de Ordens de Serviço</h1>

<table>
    <thead>
    <tr>
        <th>OSG</th>
        <th>OS Clt</th>
        <th>Status</th>
        <th>Abertura</th>
        <th>Cliente</th>
        <th>Credenciado</th>
        <th>Técnico</th>
        <th>Equipamento</th>
        <th>Defeito</th>
        <th>Rastreio</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="os : ${ordens}">
        <td th:text="${os.osg}">-</td>
        <td th:text="${os.osClt}">-</td>
        <td>
            <span class="badge"
                  th:classappend="${os.status}"
                  th:text="${os.status}">-</span>
        </td>
        <td th:text="${os.dataHoraAbertura != null ?
                        #temporals.format(os.dataHoraAbertura, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
        <td th:text="${os.cliente?.nome}">-</td>
        <td th:text="${os.credenciado?.rag}">-</td>
        <td th:text="${os.tecnico?.nome}">-</td>
        <td th:text="${os.equipamento}">-</td>
        <td th:text="${os.defeito}">-</td>
        <td th:text="${os.rastreio}">-</td>
    </tr>
    </tbody>
</table>

<div class="footer">
    Gerado em <span th:text="${#temporals.formatISO(#temporals.createNow())}"></span>
    &nbsp;|&nbsp; Total: <span th:text="${ordens.size()}"></span> registros
</div>

</body>
</html>
