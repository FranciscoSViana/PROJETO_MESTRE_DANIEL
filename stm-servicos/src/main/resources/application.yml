server:
  port: ${PORT:8080}
spring:
  application:
    name: stm-servicos

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
#    hibernate:
#      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          secret-key: ${JWT_SECRET}
brevo:
  api:
    url: https://api.brevo.com/v3/smtp/email
    key: ${BREVO_API_KEY}
    sender:
      name: GUARDIAN
      email: ${BREVO_USER}

google:
  maps:
    api-key: ${GOOGLE_MAPS}

