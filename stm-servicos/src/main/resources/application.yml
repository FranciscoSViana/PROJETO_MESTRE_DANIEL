spring:
  application:
    name: stm-servicos

  datasource:
#    url: jdbc:mysql://localhost:3306/db_guardian?createDatabaseIfNotExist=true&serverTimezone=UTC
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 3600000         # 1 hora
    refresh-expiration-ms: 86400000 # 24 horas, opcional
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend:
    reset-url: http://localhost:4200/reset-password?token=

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
