name: Deploy Backend + Frontend (Docker Hub + Cloud Run)

on:
  push:
    branches:
      - main

jobs:
# ================================
# ✅ BACKEND - CLOUD RUN
# ================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔐 Login no Docker Hub
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔐 Auth no Google Cloud
      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      # ✅ Build da imagem Backend
      - name: Build da imagem Docker (Backend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/guardian:latest ./stm-servicos

      # ✅ Push da imagem no Docker Hub
      - name: Push da imagem (Backend)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/guardian:latest

      # ✅ Deploy no Cloud Run (imagem do Docker Hub)
      - name: Deploy no Cloud Run (Backend)
        run: |
          gcloud run deploy stm-servicos \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian:latest \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars DB_URL=${{ secrets.DB_URL }},DB_USER=${{ secrets.DB_USER }},DB_PASS=${{ secrets.DB_PASS }},JWT_SECRET=${{ secrets.JWT_SECRET }},MAIL_HOST=${{ secrets.MAIL_HOST }},MAIL_PORT=${{ secrets.MAIL_PORT }},MAIL_USER=${{ secrets.MAIL_USER }},MAIL_PASS=${{ secrets.MAIL_PASS }},TOKEN_URL=${{ secrets.TOKEN_URL }}

# ================================
# ✅ FRONTEND - CLOUD RUN
# ================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # 🔐 Login no Docker Hub
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔐 Auth no Google Cloud
      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      # ✅ Build da imagem Frontend
      - name: Build da imagem Docker (Frontend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/guardian-front:latest ./stm-servicos-front

      # ✅ Push da imagem no Docker Hub
      - name: Push da imagem (Frontend)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/guardian-front:latest

      # ✅ Deploy no Cloud Run
      - name: Deploy Frontend no Cloud Run
        run: |
          gcloud run deploy guardian-front \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian-front:latest \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated
