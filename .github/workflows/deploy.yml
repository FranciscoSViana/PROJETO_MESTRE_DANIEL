name: Deploy Backend (Cloud Run) + Frontend (GitHub Pages)

on:
  push:
    branches:
      - main

jobs:
# ================================
# ✅ BACKEND - GOOGLE CLOUD RUN
# ================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar projeto GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      - name: Build da imagem Docker (Backend)
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/stm-servicos ./backend

      - name: Push da imagem para o GCP
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/stm-servicos

      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy stm-servicos \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/stm-servicos \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars \
              DB_URL=${{ secrets.DB_URL }},\
              DB_USER=${{ secrets.DB_USER }},\
              DB_PASS=${{ secrets.DB_PASS }},\
              JWT_SECRET=${{ secrets.JWT_SECRET }},\
              MAIL_HOST=${{ secrets.MAIL_HOST }},\
              MAIL_PORT=${{ secrets.MAIL_PORT }},\
              MAIL_USER=${{ secrets.MAIL_USER }},\
              MAIL_PASS=${{ secrets.MAIL_PASS }}

# ================================
# ✅ FRONTEND - GITHUB PAGES
# ================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependências
        run: |
          cd frontend
          npm install

      - name: Build Angular produção
        run: |
          cd frontend
          npm run build -- --configuration=production

      - name: Upload para GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/stm-servicos-front

      - name: Publicar no GitHub Pages
        uses: actions/deploy-pages@v4
