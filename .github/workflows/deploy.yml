name: Deploy Backend + Frontend (Docker Hub + Cloud Run)

on:
  push:
    branches:
      - develop   # → apenas testes
      - main      # → tag automática + deploy (sem testes)

permissions:
  contents: write  # necessário para criar e publicar tags

# ================================
# 🧪 TESTES - apenas no develop
# ================================
jobs:
  test-backend:
    name: Testes Backend
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('stm-servicos/**/*.gradle*', 'stm-servicos/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Permissão no gradlew
        run: chmod +x stm-servicos/gradlew

      - name: Executar testes
        working-directory: stm-servicos
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Publicar relatório de testes
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: stm-servicos/build/reports/tests/test/
          retention-days: 7

# ================================
# 🏷️ TAG AUTOMÁTICA - apenas no main
# ================================
  create-tag:
    name: Criar Tag
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Incrementar versão (patch)
        id: bump
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep '^v' | head -n1)

          if [[ -z "$LAST_TAG" ]]; then
            NEW_TAG="v1.0.0"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST_TAG//v/}"
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Nova tag: $NEW_TAG"

      - name: Criar e publicar a tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ steps.bump.outputs.new_tag }}
          git push origin ${{ steps.bump.outputs.new_tag }}

# ================================
# ✅ BACKEND - CLOUD RUN
# ================================
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: create-tag

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      - name: Build da imagem Docker (Backend)
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/guardian:${{ needs.create-tag.outputs.new_tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/guardian:latest \
            ./stm-servicos

      - name: Push da imagem (Backend)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/guardian:${{ needs.create-tag.outputs.new_tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/guardian:latest

      - name: Deploy no Cloud Run (Backend)
        run: |
          gcloud run deploy stm-servicos \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian:${{ needs.create-tag.outputs.new_tag }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --timeout 600s \
            --set-env-vars BREVO_API_KEY=${{ secrets.BREVO_API_KEY }},SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }},SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }},SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }},JWT_SECRET=${{ secrets.JWT_SECRET }},MAIL_HOST=${{ secrets.MAIL_HOST }},MAIL_PORT=${{ secrets.MAIL_PORT }},BREVO_USER=${{ secrets.BREVO_USER }},MAIL_PASS=${{ secrets.MAIL_PASS }},TOKEN_URL=${{ secrets.TOKEN_URL }},GOOGLE_MAPS=${{ secrets.GOOGLE_MAPS }},AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }},AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }},AWS_REGION=${{ secrets.AWS_REGION }},AWS_BUCKET=${{ secrets.AWS_BUCKET }},URL=${{ secrets.URL }}

# ================================
# ✅ FRONTEND - CLOUD RUN
# ================================
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [create-tag, deploy-backend]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      - name: Build da imagem Docker (Frontend)
        run: |
          docker build --no-cache \
            -t ${{ secrets.DOCKER_USERNAME }}/guardian-front:${{ needs.create-tag.outputs.new_tag }} \
            -t ${{ secrets.DOCKER_USERNAME }}/guardian-front:latest \
            ./stm-servicos-front

      - name: Push da imagem (Frontend)
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/guardian-front:${{ needs.create-tag.outputs.new_tag }}
          docker push ${{ secrets.DOCKER_USERNAME }}/guardian-front:latest

      - name: Deploy Frontend no Cloud Run
        run: |
          gcloud run deploy guardian-front \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian-front:${{ needs.create-tag.outputs.new_tag }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port 80 \
            --tag latest \
            --revision-suffix ${{ github.sha }} \
            --min-instances 0 \
            --max-instances 10