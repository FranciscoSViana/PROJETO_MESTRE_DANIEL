name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ============================================================
  # JOB 1: Pegar última tag criada no develop e fazer deploy
  # ============================================================
  deploy-backend:
    name: Build + Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pegar última tag disponível
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Tag para deploy: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem Docker (Backend)
        uses: docker/build-push-action@v5
        with:
          context: ./stm-servicos
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guardian:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/guardian:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/guardian:latest
          cache-to: type=inline

      - name: Deploy no Cloud Run (Backend)
        run: |
          gcloud run deploy stm-servicos \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian:${{ steps.tag.outputs.tag }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --timeout 600s \
            --set-env-vars BREVO_API_KEY=${{ secrets.BREVO_API_KEY }},SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }},SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }},SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }},JWT_SECRET=${{ secrets.JWT_SECRET }},MAIL_HOST=${{ secrets.MAIL_HOST }},MAIL_PORT=${{ secrets.MAIL_PORT }},BREVO_USER=${{ secrets.BREVO_USER }},MAIL_PASS=${{ secrets.MAIL_PASS }},TOKEN_URL=${{ secrets.TOKEN_URL }},GOOGLE_MAPS=${{ secrets.GOOGLE_MAPS }},AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }},AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }},AWS_REGION=${{ secrets.AWS_REGION }},AWS_BUCKET=${{ secrets.AWS_BUCKET }},URL=${{ secrets.URL }}

  # ============================================================
  # JOB 2: GitHub Release após deploy bem-sucedido
  # ============================================================
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pegar última tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          make_latest: true