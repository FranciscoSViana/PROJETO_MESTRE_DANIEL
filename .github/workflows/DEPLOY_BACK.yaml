name: Deploy Backend

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Permissão ao gradlew
        run: chmod +x stm-servicos/gradlew

      - name: Executar testes unitários e gerar JaCoCo
        working-directory: stm-servicos
        run: ./gradlew clean test jacocoTestReport --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload relatório JaCoCo Unit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-unit-report
          path: stm-servicos/build/reports/jacoco/test/
          retention-days: 7

  e2e-tests:
    name: Testes E2E (Cucumber)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Permissão ao gradlew
        run: chmod +x stm-servicos/gradlew

      - name: Executar testes E2E
        working-directory: stm-servicos
        run: ./gradlew e2eTest --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: e2e

      - name: Upload relatório JaCoCo E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-e2e-report
          path: stm-servicos/build/reports/jacoco/e2e/
          retention-days: 7

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs:
      - unit-tests
      - e2e-tests
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Permissão ao gradlew
        run: chmod +x stm-servicos/gradlew

      - name: Compilar projeto
        working-directory: stm-servicos
        run: ./gradlew classes testClasses --no-daemon

      - name: Download relatório JaCoCo Unit
        uses: actions/download-artifact@v4
        with:
          name: jacoco-unit-report
          path: stm-servicos/build/reports/jacoco/test/

      - name: Download relatório JaCoCo E2E
        uses: actions/download-artifact@v4
        with:
          name: jacoco-e2e-report
          path: stm-servicos/build/reports/jacoco/e2e/

      - name: Análise SonarCloud
        working-directory: stm-servicos
        run: |
          ./gradlew sonar \
            --no-daemon \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.ignore.failure=true \
            -Dsonar.java.binaries=build/classes/java/main \
            -Dsonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml,build/reports/jacoco/e2e/jacocoE2EReport.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy-backend:
    name: Build + Deploy Backend
    runs-on: ubuntu-latest
    needs: sonarcloud
    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pegar última tag disponível
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Tag para deploy: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: ./stm-servicos
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guardian:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/guardian:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/guardian:latest
          cache-to: type=inline

      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy stm-servicos \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian:${{ steps.tag.outputs.tag }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --timeout 600s \
            --set-env-vars BREVO_API_KEY=${{ secrets.BREVO_API_KEY }},SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }},SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }},SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }},JWT_SECRET=${{ secrets.JWT_SECRET }},MAIL_HOST=${{ secrets.MAIL_HOST }},MAIL_PORT=${{ secrets.MAIL_PORT }},BREVO_USER=${{ secrets.BREVO_USER }},MAIL_PASS=${{ secrets.MAIL_PASS }},TOKEN_URL=${{ secrets.TOKEN_URL }},GOOGLE_MAPS=${{ secrets.GOOGLE_MAPS }},AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }},AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }},AWS_REGION=${{ secrets.AWS_REGION }},AWS_BUCKET=${{ secrets.AWS_BUCKET }},URL=${{ secrets.URL }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pegar última tag
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0)
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
          make_latest: true