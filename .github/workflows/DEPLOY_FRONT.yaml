name: Deploy Frontend

on:
  # Dispara automaticamente após o workflow de backend concluir com sucesso
  workflow_run:
    workflows:
      - "Deploy Backend"
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

jobs:
  # ============================================================
  # JOB 1: Deploy Frontend (somente se o backend passou)
  # ============================================================
  deploy-frontend:
    name: Build + Deploy Frontend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout com histórico de tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pegar última tag disponível
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
          echo "Tag para deploy: $LATEST_TAG"
          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar GCP
        run: |
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud config set run/region ${{ secrets.GCP_REGION }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem Docker (Frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./stm-servicos-front
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/guardian-front:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/guardian-front:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/guardian-front:latest
          cache-to: type=inline

      - name: Deploy Frontend no Cloud Run
        run: |
          gcloud run deploy guardian-front \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/guardian-front:${{ steps.tag.outputs.tag }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port 80 \
            --min-instances 0 \
            --max-instances 10