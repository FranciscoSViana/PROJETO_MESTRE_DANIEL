<div class="p-6 max-w-5x1 mx-auto bg-white shadow-lg rounded-lg mt-6">

  <h2 class="text-2x1 font-semibold text-gray-700 mb-4">
    {{ camposForm.get("id")?.value ? "Editar Ordem de Serviço" : "Nova Ordem de Serviço" }}
  </h2>
  <hr>

  <form id="osForm" [formGroup]="camposForm" (ngSubmit)="salvar()">

    <!-- IDs -->
    <input type="hidden" formControlName="id" />
    <input type="hidden" formControlName="clienteId" />
    <input type="hidden" formControlName="credenciadoId" />

    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Data / Hora de Abertura</label>
      <input type="datetime-local" formControlName="dataHoraAbertura"
        class="w-full p-3 border border-gray-300 rounded shadow-sm" />
    </div>

    <!-- OS CLT | OSG -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label>OS CLT</label>
        <input formControlName="osClt" class="w-full p-3 border rounded" />
      </div>

      <div>
        <label>OSG</label>
        <input formControlName="osg" class="w-full p-3 border rounded" />
      </div>
    </div>

    <!-- STATUS -->
    <div class="mb-4">
      <label>Status</label>
      <input formControlName="status" readonly class="w-full p-3 border rounded" />
    </div>

    <!-- CÓD CLIENTE | CLIENTE -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label>Código do Cliente</label>
        <input formControlName="codigoCliente" (blur)="buscarClientePorCodigo()" class="w-full p-3 border rounded" />
      </div>

      <div>
        <label>Cliente</label>
        <input formControlName="nomeCliente" readonly class="w-full p-3 border rounded" />
      </div>
    </div>

    <!-- CONTRATO -->
    <div class="mb-4">
      <label>Contrato</label>
      <select formControlName="contratoId" class="w-full p-3 border rounded">
        <option value="" disabled>Escolha um contrato</option>
        <option *ngFor="let contrato of contratosCliente$ | async" [value]="contrato.id?.toString()">
          {{ contrato.numeroContrato }} - {{ contrato.nomeContrato }}
        </option>
      </select>
    </div>

    <!-- CONTATO | TELEFONE -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label>Contato</label>
        <input formControlName="contato" class="w-full p-3 border rounded" />
      </div>

      <div>
        <label>Telefone</label>
        <input formControlName="telefone" mask="(00) 0000-0000||(00) 00000-0000" class="w-full p-3 border rounded" />
      </div>
    </div>

    <!-- DEPARTAMENTO -->
    <div class="mb-4">
      <label>Departamento</label>
      <input formControlName="departamento" class="w-full p-3 border rounded" />
    </div>

    <!-- ENDEREÇO -->
    <h3 class="text-xl font-semibold mt-6 mb-2">Endereço</h3>

    <div class="grid grid-cols-3 gap-4 mb-4">
      <input formControlName="cep" mask="00000-000" placeholder="CEP" (blur)="buscarCep(); buscarCredenciadosPorCepFormulario()" class="p-3 border rounded" />
      <input formControlName="logradouro" placeholder="Logradouro" class="p-3 border rounded" />
      <input formControlName="numero" placeholder="Número" class="p-3 border rounded" />
      <input formControlName="bairro" placeholder="Bairro" class="p-3 border rounded" />
      <input formControlName="cidade" placeholder="Cidade" class="p-3 border rounded" />
      <input formControlName="estado" placeholder="UF" maxlength="2" class="p-3 border rounded" />
    </div>

    <!-- EQUIPAMENTO | SÉRIE | PIB -->
    <div class="grid grid-cols-3 gap-4 mb-4">
      <input formControlName="equipamento" placeholder="Equipamento" class="p-3 border rounded" />
      <input formControlName="serie" placeholder="Série" class="p-3 border rounded" />
      <input formControlName="pib" placeholder="PIB" class="p-3 border rounded" />
    </div>

    <!-- DEFEITO -->
    <div class="mb-4">
      <label>Defeito Relatado</label>
      <textarea formControlName="defeito" rows="3" class="w-full p-3 border rounded"></textarea>
    </div>

    <!-- RASTREIO -->
    <div class="mb-4">
      <label>Código de Rastreio</label>
      <input formControlName="rastreio" class="w-full p-3 border rounded" />
    </div>

    <div class="mb-4">
      <label class="block font-medium text-gray-600">
        Raio de busca: {{ camposForm.get('raioKm')?.value }} km
      </label>

      <input type="range" min="50" max="3000" step="50" formControlName="raioKm" (change)="rebuscarCredenciados()"
        class="w-full" />
    </div>


    <!-- CREDENCIADO -->
    <div class="mb-4">
      <label>Credenciado</label>
      <select formControlName="credenciadoId" (change)="onCredenciadoChange($event)" class="w-full p-3 border rounded">
        <option value="" disabled>Escolha um credenciado</option>
        <option *ngFor="let cred of credenciadosProximos$ | async" [value]="cred.id">
          {{ cred.rag }} - {{ cred.codigo }}
        </option>
      </select>
    </div>

    <!-- TÉCNICO -->
    <div class="mb-6">
      <label>Técnico</label>
      <select formControlName="tecnicoId" class="w-full p-3 border rounded"
        [disabled]="tecnicosCredenciado.length === 0">
        <option value="" disabled>Escolha um técnico</option>
        <option *ngFor="let t of tecnicosCredenciado" [value]="t.id">
          {{ t.nome }} - {{ t.telefone }}
        </option>
      </select>
    </div>

    <!-- BOTÃO -->
    <button type="submit" class="w-full bg-blue-600 text-white p-3 rounded">
      Salvar Ordem de Serviço
    </button>

  </form>
</div>
