<div class="p-6 max-w-7xl mx-auto bg-white shadow-lg rounded-lg mt-6">

  <!-- Cabeçalho -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-semibold text-gray-700">Ordens de Serviço</h2>

    <button routerLink="/ordem-servico/cadastro"
      class="px-4 py-2 bg-green-600 text-white rounded-lg shadow hover:bg-green-700">
      + Nova OS
    </button>
  </div>

  <hr class="mb-4">

  <!-- Tabela -->
  <div class="overflow-x-auto">
    <table class="w-full border-collapse">
      <thead class="bg-gray-100 text-gray-700">
        <tr>
          <th class="p-3 border text-center">OS CLT</th>
          <th class="p-3 border text-center">OSG</th>
          <th class="p-3 border text-center">Cliente</th>
          <th class="p-3 border text-center">Credenciado</th>
          <th class="p-3 border text-center">Status</th>
          <th class="p-3 border text-center">Ações</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let os of ordensServico" class="hover:bg-gray-50">
          <td class="p-3 border text-center">{{ os.osClt }}</td>
          <td class="p-3 border text-center">{{ os.osg }}</td>
          <td class="p-3 border text-center">{{ os.clienteNome }}</td>
          <td class="p-3 border text-center">{{ os.credenciadoNome }}</td>
          <td class="p-3 border text-center">{{ os.status }}</td>

          <!-- BOTÕES -->
          <td class="p-3 border text-center flex justify-center gap-2">
            <button [routerLink]="['/ordem-servico/editar', os.id]"
              class="px-3 py-1 text-sm rounded bg-transparent hover:bg-gray-200 text-gray-800 transition-colors">
              <i class="fa-solid fa-pen-to-square text-blue-600 text-2x1"></i>
              <!-- Editar -->
            </button>

            <button (click)="excluir(os.id)"
              class="px-3 py-1 text-sm rounded bg-transparent hover:bg-gray-200 text-red-600 flex items-center gap-1 transition-colors">
              <i class="fa-solid fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Paginação -->
  <div class="mt-6 flex justify-center items-center gap-4">
    <button (click)="paginaAnterior()" [disabled]="page === 0"
      class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed">
      Anterior
    </button>

    <span class="text-gray-700 font-medium">
      Página {{ page + 1 }} de {{ totalPages }}
    </span>

    <button (click)="proximaPagina()" [disabled]="(page + 1) >= totalPages"
      class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed">
      Próxima
    </button>
  </div>
</div>
