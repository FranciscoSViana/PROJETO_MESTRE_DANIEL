<div class="p-4 md:p-6 max-w-6xl mx-auto bg-white shadow-lg rounded-lg mt-6">

  <!-- ================= HEADER ================= -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-2 mb-4">
    <h2 class="text-xl md:text-2xl font-semibold text-gray-700">Meu Perfil</h2>
  </div>

  <hr class="mb-6">

  <div class="space-y-6">

    <!-- ================= AVATAR + NOME ================= -->
    <div class="flex flex-col sm:flex-row items-center sm:items-start gap-4">

      <div
        class="w-16 h-16 rounded-full bg-blue-600 text-white flex items-center justify-center text-2xl font-bold shadow-lg shrink-0">
        {{ usuarioLogado[0] | uppercase }}
      </div>

      <div class="text-center sm:text-left">
        <p class="text-lg font-semibold text-gray-800">{{ usuarioLogado }}</p>
        <p class="text-sm text-gray-500">{{ email }}</p>
      </div>

    </div>

    <hr>

    <!-- ================= DADOS DA CONTA ================= -->
    <div>
      <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <i class="fa-solid fa-user mr-1 text-blue-500"></i> Informações da Conta
      </h3>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

        <div>
          <label class="block text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">Nome</label>
          <p class="p-3 border border-gray-200 rounded-lg bg-gray-50 text-sm text-gray-700">{{ usuarioLogado }}</p>
        </div>

        <div>
          <label class="block text-gray-500 text-xs font-semibold uppercase tracking-wide mb-1">E-mail</label>
          <p class="p-3 border border-gray-200 rounded-lg bg-gray-50 text-sm text-gray-700">{{ email }}</p>
        </div>

      </div>
    </div>

    <!-- ================= BOTÕES ================= -->
    <div class="flex flex-col-reverse md:flex-row justify-end gap-3 pt-4 border-t">
      <button routerLink="/usuario/editar"
        class="flex items-center justify-center gap-2 px-5 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow hover:bg-blue-700 transition text-sm w-full md:w-auto">
        <i class="fa-solid fa-pen-to-square"></i> Editar Dados
      </button>
    </div>

  </div>

</div>
