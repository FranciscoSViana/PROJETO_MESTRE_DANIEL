<div class="w-full flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-md bg-white shadow-lg rounded-lg p-6 md:p-8">

    <!-- ================= HEADER ================= -->
    <div class="text-center mb-6">
      <div class="w-14 h-14 rounded-full bg-green-600 text-white flex items-center justify-center text-2xl mx-auto mb-3 shadow">
        <i class="fa-solid fa-key"></i>
      </div>
      <h2 class="text-xl md:text-2xl font-semibold text-gray-700">Nova Senha</h2>
      <p class="text-sm text-gray-500 mt-1">
        Escolha uma senha forte para sua conta
      </p>
    </div>

    <hr class="mb-6">

    <!-- ================= FORMULÁRIO ================= -->
    <form [formGroup]="form" (ngSubmit)="resetar()" class="space-y-4">

      <div>
        <label class="block text-gray-600 font-medium mb-1 text-sm">Nova Senha</label>
        <input type="password" formControlName="senha" placeholder="Digite a nova senha"
          class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />

        <!-- Barra de força -->
        <div class="h-2 mt-2 bg-gray-200 rounded">
          <div class="h-2 rounded transition-all" [style.width.%]="forca" [ngClass]="classe"></div>
        </div>
        <small class="text-xs mt-1 block" [ngClass]="{
          'text-red-500':    forca <= 25,
          'text-yellow-500': forca > 25 && forca <= 50,
          'text-blue-500':   forca > 50 && forca <= 75,
          'text-green-600':  forca > 75
        }">
          {{
            forca === 0   ? '' :
            forca <= 25   ? 'Senha fraca' :
            forca <= 50   ? 'Senha razoável' :
            forca <= 75   ? 'Senha boa' :
                            'Senha forte'
          }}
        </small>
      </div>

      <!-- Mensagem de erro -->
      <div *ngIf="erro"
        class="flex items-center gap-2 px-4 py-3 bg-red-50 border border-red-300 text-red-600 rounded-lg text-sm">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ erro }}
      </div>

      <!-- Mensagem de sucesso -->
      <div *ngIf="mensagem"
        class="flex items-center gap-2 px-4 py-3 bg-green-50 border border-green-300 text-green-700 rounded-lg text-sm">
        <i class="fa-solid fa-circle-check"></i>
        {{ mensagem }}
      </div>

      <button type="submit"
        class="w-full px-5 py-3 bg-green-600 text-white font-semibold rounded-lg shadow hover:bg-green-700 transition text-sm">
        <i class="fa-solid fa-floppy-disk mr-1"></i> Atualizar Senha
      </button>

    </form>

    <!-- ================= VOLTAR ================= -->
    <div class="mt-6 text-center">
      <a routerLink="/login"
        class="flex items-center justify-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao login
      </a>
    </div>

  </div>

</div>
