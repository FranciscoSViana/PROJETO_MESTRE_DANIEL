<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
    <h2 class="text-2x1 font-semibold text-gray-700 mb-4">
        {{ usuarioId ? 'Atualização de Cadastro' : 'Cadastro de Usuário' }}
    </h2>

    <hr>

    <form [formGroup]="cadastroForm" (ngSubmit)="salvar()">

        <!-- USUÁRIO -->
        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Usuário</label>
            <input type="text" formControlName="nome"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('nome')">
                Campo obrigatório.
            </span>
        </div>

        <!-- EMAIL -->
        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">E-mail</label>
            <input type="email" formControlName="email"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('email')">
                Informe um e-mail válido.
            </span>
        </div>

        <!-- SENHA -->
        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Senha</label>

            <input type="password" formControlName="senha" placeholder="Digite a senha" (input)="avaliarForcaSenha()"
                (paste)="bloquearColar($event)" class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring"
                [ngClass]="{
                    'border-red-500': isCampoInvalido('senha'),
                    'border-green-500': !isCampoInvalido('senha') && cadastroForm.get('senha')?.value
                }" />

            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('senha')">
                Senha é obrigatória.
            </span>

            <!-- Barra de força -->
            <div *ngIf="forcaSenha !== null" class="h-2 mt-2 bg-gray-200 rounded">
                <div class="h-2 rounded transition-all" [ngClass]="forcaSenhaClasse" [style.width.%]="forcaSenha"></div>
            </div>

            <small *ngIf="forcaSenha !== null" class="text-gray-600">
                {{ forcaSenhaTexto }}
            </small>
        </div>

        <!-- CONFIRMAR SENHA -->
        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Confirmar Senha</label>

            <input type="password" formControlName="confirmarSenha" placeholder="Repita a senha"
                (paste)="bloquearColar($event)"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />

            <span class="text-red-500 text-sm" *ngIf="cadastroForm.get('confirmarSenha')?.errors?.['naoConfere']">
                Senhas não conferem.
            </span>
        </div>

        <!-- PERMISSÃO -->
        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Permissão</label>
            <select formControlName="roles"
                class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400">
                <option value="">Selecione um perfil</option>
                <option *ngFor="let role of rolesDisponiveis" [value]="role">
                    {{ role }}
                </option>
            </select>

            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('roles')">
                Campo obrigatório.
            </span>
        </div>

        <button type="submit" class="w-full bg-green-600 text-white font-semibold p-3 rounded hover:bg-green-700">
            {{ usuarioId ? 'Atualizar' : 'Cadastrar' }}
        </button>
    </form>
</div>
