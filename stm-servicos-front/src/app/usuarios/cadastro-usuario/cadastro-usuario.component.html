<div class="p-4 md:p-6 max-w-6xl mx-auto bg-white shadow-lg rounded-lg mt-6">

    <!-- ================= HEADER ================= -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-2 mb-4">
        <h2 class="text-xl md:text-2xl font-semibold text-gray-700">
            {{ usuarioId ? 'Atualização de Cadastro' : 'Cadastro de Usuário' }}
        </h2>
        <button type="button" routerLink="/usuarios"
            class="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition">
            <i class="fa-solid fa-arrow-left"></i> Voltar
        </button>
    </div>

    <hr class="mb-6">

    <form [formGroup]="cadastroForm" (ngSubmit)="salvar()" class="space-y-6">

        <!-- ================= DADOS DO USUÁRIO ================= -->
        <div>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
                <i class="fa-solid fa-user mr-1 text-blue-500"></i> Dados do Usuário
            </h3>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                <div>
                    <label class="block text-gray-600 font-medium mb-1 text-sm">Usuário *</label>
                    <input type="text" formControlName="nome"
                        class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
                    <span class="text-red-500 text-xs mt-1 block" *ngIf="isCampoInvalido('nome')">
                        Campo obrigatório.
                    </span>
                </div>

                <div>
                    <label class="block text-gray-600 font-medium mb-1 text-sm">E-mail *</label>
                    <input type="email" formControlName="email"
                        class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
                    <span class="text-red-500 text-xs mt-1 block" *ngIf="isCampoInvalido('email')">
                        Informe um e-mail válido.
                    </span>
                </div>

                <div>
                    <label class="block text-gray-600 font-medium mb-1 text-sm">Permissão *</label>
                    <select formControlName="roles"
                        class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
                        <option value="">Selecione um perfil</option>
                        <option *ngFor="let role of rolesDisponiveis" [value]="role">{{ role }}</option>
                    </select>
                    <span class="text-red-500 text-xs mt-1 block" *ngIf="isCampoInvalido('roles')">
                        Campo obrigatório.
                    </span>
                </div>

            </div>
        </div>

        <hr>

        <!-- ================= SENHA ================= -->
        <div>
            <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
                <i class="fa-solid fa-lock mr-1 text-blue-500"></i> Senha
            </h3>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                <div>
                    <label class="block text-gray-600 font-medium mb-1 text-sm">Senha *</label>
                    <input type="password" formControlName="senha" placeholder="Digite a senha"
                        (input)="avaliarForcaSenha()" (paste)="bloquearColar($event)"
                        class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm"
                        [ngClass]="{
              'border-red-500':   isCampoInvalido('senha'),
              'border-green-500': !isCampoInvalido('senha') && cadastroForm.get('senha')?.value
            }" />
                    <span class="text-red-500 text-xs mt-1 block" *ngIf="isCampoInvalido('senha')">
                        Senha é obrigatória.
                    </span>

                    <!-- Barra de força -->
                    <div *ngIf="forcaSenha !== null" class="h-2 mt-2 bg-gray-200 rounded">
                        <div class="h-2 rounded transition-all" [ngClass]="forcaSenhaClasse"
                            [style.width.%]="forcaSenha"></div>
                    </div>
                    <small *ngIf="forcaSenha !== null" class="text-gray-500 text-xs">{{ forcaSenhaTexto }}</small>
                </div>

                <div>
                    <label class="block text-gray-600 font-medium mb-1 text-sm">Confirmar Senha *</label>
                    <input type="password" formControlName="confirmarSenha" placeholder="Repita a senha"
                        (paste)="bloquearColar($event)"
                        class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
                    <span class="text-red-500 text-xs mt-1 block"
                        *ngIf="cadastroForm.get('confirmarSenha')?.errors?.['naoConfere']">
                        Senhas não conferem.
                    </span>
                </div>

            </div>
        </div>

        <!-- ================= BOTÕES ================= -->
        <div class="flex flex-col-reverse md:flex-row justify-end gap-3 pt-4 border-t">
            <button type="button" routerLink="/usuarios"
                class="px-5 py-3 bg-gray-400 text-white rounded-lg hover:bg-gray-500 transition text-sm w-full md:w-auto">
                Cancelar
            </button>
            <button type="submit"
                class="px-5 py-3 bg-green-600 text-white font-semibold rounded-lg shadow hover:bg-green-700 transition text-sm w-full md:w-auto">
                <i class="fa-solid fa-floppy-disk mr-1"></i>
                {{ usuarioId ? 'Atualizar' : 'Cadastrar' }}
            </button>
        </div>

    </form>

</div>
