<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">{{ usuarioId ? 'Atualização de Cadastro' : 'Cadastro de Usuário' }}</h2>
    <hr>

    <form [formGroup]="cadastroForm" (ngSubmit)="salvar()">

        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Usuário</label>
            <input type="text" formControlName="nome"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('usuario')">Campo obrigatório.</span>
        </div>

        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">E-mail</label>
            <input type="email" formControlName="email"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('email')">Informe um e-mail válido.</span>
        </div>

        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Senha</label>
            <input type="password" formControlName="senha"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('senha')">Campo obrigatório.</span>
        </div>

        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Confirmar Senha</label>
            <input type="password" formControlName="confirmarSenha"
                class="w-full p-3 border border-gray-300 rounded focus:ring focus:ring-blue-400" />
            <span class="text-red-500 text-sm" *ngIf="cadastroForm.get('confirmarSenha')?.errors?.['naoConfere']">Senhas
                não conferem.</span>
        </div>

        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Permissão</label>
            <select formControlName="roles"
                class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400">
                <option value="">Selecione um perfil</option>
                <option *ngFor="let role of rolesDisponiveis" [value]="role">
                    {{ role }}
                </option>
            </select>
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('roles')">Campo obrigatório.</span>
        </div>


        <button type="submit" class="w-full bg-green-600 text-white font-semibold p-3 rounded hover:bg-green-700">
            Cadastrar
        </button>
    </form>
</div>
