<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">

  <div class="w-full max-w-md bg-white shadow-lg rounded-lg p-6 md:p-8">

    <!-- ================= HEADER ================= -->
    <div class="text-center mb-6">
      <div
        class="w-14 h-14 rounded-full bg-blue-600 text-white flex items-center justify-center text-2xl mx-auto mb-3 shadow">
        <i class="fa-solid fa-lock"></i>
      </div>
      <h2 class="text-xl md:text-2xl font-semibold text-gray-700">Recuperar Senha</h2>
      <p class="text-sm text-gray-500 mt-1">
        Informe seu e-mail para receber o link de recuperação
      </p>
    </div>

    <hr class="mb-6">

    <!-- ================= FORMULÁRIO ================= -->
    <form [formGroup]="form" (ngSubmit)="enviar()" class="space-y-4">

      <div>
        <label class="block text-gray-600 font-medium mb-1 text-sm">E-mail</label>
        <input type="email" formControlName="email" placeholder="Digite seu e-mail"
          class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
      </div>

      <!-- Mensagem de sucesso -->
      <div *ngIf="mensagem"
        class="flex items-center gap-2 px-4 py-3 bg-green-50 border border-green-300 text-green-700 rounded-lg text-sm">
        <i class="fa-solid fa-circle-check"></i>
        {{ mensagem }}
      </div>

      <button type="submit" [disabled]="!!mensagem"
        class="w-full px-5 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow hover:bg-blue-700 transition text-sm disabled:opacity-50 disabled:cursor-not-allowed">
        <i class="fa-solid fa-paper-plane mr-1"></i> Enviar link de recuperação
      </button>

    </form>

    <!-- ================= VOLTAR ================= -->
    <div class="mt-6 text-center">
      <a routerLink="/login"
        class="flex items-center justify-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition">
        <i class="fa-solid fa-arrow-left"></i> Voltar ao login
      </a>
    </div>

  </div>

</div>
