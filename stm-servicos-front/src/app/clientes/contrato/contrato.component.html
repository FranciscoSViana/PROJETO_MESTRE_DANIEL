<div class="p-6 max-w-5x1 mx-auto bg-white shadow-lg rounded-lg mt-6">

    <!-- TOPO: Cliente + Botão -->
    <div class="flex justify-between items-start gap-x-12 mb-8">
        <!-- Cliente -->
        <div>
            <p class="text-lg font-semibold text-gray-800">
                {{ cliente?.nome }} CNPJ: {{ formatarCnpj(cliente?.cnpj) }}
            </p>
        </div>

        <!-- Botão -->
        <button type="button" (click)="abrirModal()" class="h-[32px] px-6 bg-green-600 text-white rounded-md shadow
             hover:bg-green-700 transition">
            + Novo Contrato
        </button>
    </div>

    <!-- TÍTULO DA SEÇÃO -->
    <h2 class="text-x1 font-semibold text-gray-800 mb-6">
        Contratos do Cliente
    </h2>

    <!-- Lista de contratos -->
    <table class="min-w-full border-collapse">
        <thead class="bg-gray-100">
            <tr>
                <th class="p-4 border text-left font-semibold">
                    Número do Contrato
                </th>
            </tr>
        </thead>

        <tbody>
            <tr *ngFor="let c of contratos" class="hover:bg-gray-50">
                <td class="p-4 border">
                    {{ c.numeroContrato }}
                </td>
            </tr>

            <tr *ngIf="contratos.length === 0">
                <td class="p-4 text-center text-gray-500">
                    Nenhum contrato cadastrado.
                </td>
            </tr>
        </tbody>
    </table>
    <!-- MODAL -->
    <div *ngIf="modalAberto" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50">

        <div class="bg-white w-full max-w-md rounded-lg shadow-lg p-6">

            <h3 class="text-x1 font-semibold text-gray-700 mb-4">
                Novo Contrato
            </h3>

            <form [formGroup]="contratoForm" (ngSubmit)="salvarContrato()">

                <div class="mb-4">
                    <label class="block text-gray-600 font-medium mb-1">
                        Número do Contrato
                    </label>

                    <input type="text" formControlName="numeroContrato" class="w-full p-3 border border-gray-300 rounded
                 focus:ring focus:ring-blue-400" />

                    <span class="text-red-500 text-sm" *ngIf="contratoForm.get('numeroContrato')?.invalid
                  && contratoForm.get('numeroContrato')?.touched">
                        Campo obrigatório
                    </span>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="button" (click)="fecharModal()"
                        class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
                        Cancelar
                    </button>

                    <button type="submit" class="px-4 py-2 bg-green-600 text-white rounded
                 hover:bg-green-700">
                        Salvar
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>
