<div class="p-6 max-w-7x1 mx-auto bg-white shadow-lg rounded-lg mt-6">

  <!-- Cabeçalho -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-semibold text-gray-700">Clientes Cadastrados</h2>

    <button routerLink="/clientes/cadastro"
      class="px-4 py-2 bg-green-600 text-white rounded-lg shadow hover:bg-green-700">
      + Novo Cliente
    </button>
  </div>

  <hr class="mb-4">

  <!-- Tabela -->
  <div class="px-4">
    <div class="overflow-x-auto">
      <table class="min-w-full border-collapse table-fixed">

        <thead class="bg-gray-100 text-gray-700">
          <tr class="h-12">
            <th class="p-3 border text-center w-[90px]">Código</th>
            <th class="p-3 border text-center w-[140px]">Contrato</th>
            <th class="p-3 border text-center min-w-[220px]">Nome</th>
            <th class="p-3 border text-center w-[180px]">CNPJ</th>
            <th class="p-3 border text-center min-w-[240px]">Razão Social</th>
            <th class="p-3 border text-center w-[140px]">Valor Chamado</th>
            <th class="p-3 border text-center w-[120px]">Valor KM</th>
            <th class="p-3 border text-center w-[100px]">Ações</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let c of clientes" class="hover:bg-gray-50 h-12">

            <td class="p-3 border text-center truncate">{{ c.codigo }}</td>
            <td class="p-3 border text-center truncate">{{ c.contrato }}</td>
            <td class="p-3 border text-center truncate">{{ c.nome }}</td>
            <td class="p-3 border text-center truncate">{{ formatarCnpj(c.cnpj) }}</td>
            <td class="p-3 border text-center truncate">{{ c.razaoSocial }}</td>
            <td class="p-3 border text-center truncate" mask="00,00">{{ c.valorChamado }}</td>
            <td class="p-3 border text-center truncate" mask="00,00">{{ c.valorKm }}</td>

            <td class="p-3 border">
              <div class="flex justify-center gap-2">
                <button class="w-9 h-9 flex items-center justify-center rounded hover:bg-gray-200" (click)="editar(c.id)">
                  <i class="fa-solid fa-pen-to-square text-blue-600"></i>
                </button>

                <button class="w-9 h-9 flex items-center justify-center rounded hover:bg-gray-200" (click)="excluir(c.id)">
                  <i class="fa-solid fa-trash text-red-600"></i>
                </button>
              </div>
            </td>

          </tr>
        </tbody>

      </table>
    </div>
  </div>

  <!-- Paginação -->
  <div class="mt-6 flex justify-center items-center gap-4">

    <button (click)="paginaAnterior()" [disabled]="page === 0" class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 
             disabled:opacity-40 disabled:cursor-not-allowed">
      Anterior
    </button>

    <span class="text-gray-700 font-medium">
      Página {{ page + 1 }} de {{ totalPages }}
    </span>

    <button (click)="proximaPagina()" [disabled]="(page + 1) >= totalPages" class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 
             disabled:opacity-40 disabled:cursor-not-allowed">
      Próxima
    </button>

  </div>

</div>
