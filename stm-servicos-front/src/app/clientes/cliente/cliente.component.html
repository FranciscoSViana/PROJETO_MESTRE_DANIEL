<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-6">
  
  <h2 class="text-2x1 font-semibold text-gray-700 mb-4">Novo Cliente</h2>
  <hr>

  <form id="clienteForm" [formGroup]="camposForm" (ngSubmit)="salvar()">

    <!-- Contrato -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Contrato</label>
      <input type="text"
             formControlName="contrato"
             placeholder="Ex.: 12345"
             class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400" />
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('contrato')">
        Campo obrigatório.
      </span>
    </div>

    <!-- Nome -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Nome</label>
      <input type="text"
             formControlName="nome"
             placeholder="Ex.: Cliente XPTO"
             class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400" />
      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('nome')">
        Campo obrigatório.
      </span>
    </div>

    <!-- Valores -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-600 font-medium mb-2">Valor Chamado</label>
        <input type="number"
               formControlName="valorChamado"
               class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400 no-spinner" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Valor KM</label>
        <input type="number"
               formControlName="valorKm"
               class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400 no-spinner" />
      </div>
    </div>

    <!-- CNPJ + botão -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">CNPJ</label>

      <div class="flex gap-2">
        <input type="text"
               formControlName="cnpj"
               mask="00.000.000/0000-00"
               [dropSpecialCharacters]="true"
               placeholder="00.000.000/0000-00"
               class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400" />
      </div>

      <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('cnpj')">
        Informe um CNPJ válido.
      </span>
    </div>

    <!-- Razão Social -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Razão Social</label>
      <input type="text"
             formControlName="razaoSocial"
             class="w-full p-3 bg-gray-100 border border-gray-300 rounded shadow-sm" />
    </div>

    <!-- Inscrição Estadual -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Inscrição Estadual</label>
      <input type="text"
             formControlName="inscricaoEstadual"
             class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400" />
    </div>

    <!-- Botão -->
    <button type="submit"
      class="w-full bg-green-600 text-white font-semibold p-3 rounded shadow hover:bg-green-700">
      Salvar Cliente
    </button>

  </form>
</div>
