<div class="p-6 max-w-lg mx-auto bg-white shadow-lg rounded-lg mt-20">

    <h2 class="text-2x1 font-semibold text-gray-700 mb-4 text-center">
        Login
    </h2>

    <hr class="mb-6">

    <form [formGroup]="camposForm" (ngSubmit)="login()">

        <!-- Usuário -->
        <div class="mb-4">
            <label class="block text-gray-600 font-medium mb-2">Usuário</label>

            <input type="text" formControlName="usuario" placeholder="Digite seu usuário"
                class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400" />

            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('usuario')">
                Usuário é obrigatório.
            </span>
        </div>

        <!-- Senha -->
        <!-- <div class="mb-6">
            <label class="block text-gray-600 font-medium mb-2">Senha</label>

            <input type="password" formControlName="senha" placeholder="Digite sua senha"
                class="w-full p-3 border border-gray-300 rounded shadow-sm focus:ring focus:ring-blue-400" />

            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('senha')">
                Senha é obrigatória.
            </span>
        </div> -->
        <!-- Senha -->
        <div class="mb-2">
            <label class="block text-gray-600 font-medium mb-2">Senha</label>

            <input type="password" formControlName="senha" placeholder="Digite sua senha" (input)="avaliarForcaSenha()"
                (paste)="bloquearColar($event)" class="w-full p-3 border rounded shadow-sm focus:ring" [ngClass]="{
      'border-red-500': isCampoInvalido('senha'),
      'border-green-500': !isCampoInvalido('senha') && camposForm.get('senha')?.value
    }" />

            <!-- Mensagem de erro -->
            <span class="text-red-500 text-sm" *ngIf="isCampoInvalido('senha')">
                A senha é obrigatória.
            </span>

            <!-- Barra de força -->
            <div class="h-2 mt-2 bg-gray-200 rounded">
                <div class="h-2 rounded transition-all" [ngClass]="forcaSenhaClasse" [style.width.%]="forcaSenha">
                </div>
            </div>

            <small class="text-gray-600">{{ forcaSenhaTexto }}</small>
        </div>


        <!-- Botão -->
        <button type="submit"
            class="w-full bg-blue-600 text-white font-semibold p-3 rounded shadow hover:bg-blue-700 transition">

            Entrar
        </button>

        <button type="button" routerLink="/esqueci-senha"
            class="w-full mt-3 bg-gray-200 text-gray-700 font-semibold p-3 rounded hover:bg-gray-300 transition">

            Esqueci minha senha
        </button>

    </form>
</div>
