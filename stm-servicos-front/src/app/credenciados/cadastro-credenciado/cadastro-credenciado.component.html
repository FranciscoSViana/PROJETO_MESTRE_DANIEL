<div class="p-4 md:p-6 max-w-6xl mx-auto bg-white shadow-lg rounded-lg mt-6">

  <!-- ================= HEADER ================= -->
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-2 mb-4">
    <h2 class="text-xl md:text-2xl font-semibold text-gray-700">
      {{ camposForm.get("id")?.value ? "Editar Credenciado" : "Novo Credenciado" }}
    </h2>
    <button type="button" routerLink="/credenciados"
      class="flex items-center gap-2 text-sm text-gray-500 hover:text-gray-700 transition">
      <i class="fa-solid fa-arrow-left"></i> Voltar
    </button>
  </div>

  <hr class="mb-6">

  <form [formGroup]="camposForm" (ngSubmit)="salvar()" class="space-y-6">

    <input type="hidden" formControlName="id" />

    <!-- ================= DADOS DO CREDENCIADO ================= -->
    <div>
      <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <i class="fa-solid fa-user-tie mr-1 text-blue-500"></i> Dados do Credenciado
      </h3>

      <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">

        <div class="sm:col-span-2 md:col-span-3">
          <label class="block text-gray-600 font-medium mb-1 text-sm">RAG</label>
          <input type="text" formControlName="rag"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Tipo de Pessoa</label>
          <select formControlName="tipoPessoa"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm">
            <option [ngValue]="null">Selecione</option>
            <option [ngValue]="1">Pessoa Física</option>
            <option [ngValue]="2">Pessoa Jurídica</option>
          </select>
        </div>

        <div *ngIf="tipoPessoaSelecionado">
          <label class="block text-gray-600 font-medium mb-1 text-sm">
            {{ tipoPessoaSelecionado === 1 ? 'CPF' : 'CNPJ' }}
          </label>
          <input type="text" formControlName="numeroPessoa"
            [mask]="tipoPessoaSelecionado === 1 ? '000.000.000-00' : '00.000.000/0000-00'"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Valor Chamado</label>
          <input type="text" formControlName="valorChamado" mask="separator.2" thousandSeparator="." decimalMarker=","
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Valor KM</label>
          <input type="text" formControlName="valorKm" mask="separator.2" thousandSeparator="." decimalMarker=","
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Qtd. OS Atendidas</label>
          <input type="number" formControlName="quantidadeOSAtendidas"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Contato</label>
          <input type="text" formControlName="contato"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Telefone</label>
          <input type="text" mask="(00) 0000-0000||(00) 00000-0000" formControlName="telefones"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div class="sm:col-span-2 md:col-span-2">
          <label class="block text-gray-600 font-medium mb-1 text-sm">E-mail</label>
          <input type="email" formControlName="email"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

      </div>
    </div>

    <hr>

    <!-- ================= ENDEREÇO ================= -->
    <div>
      <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">
        <i class="fa-solid fa-location-dot mr-1 text-blue-500"></i> Endereço
      </h3>

      <div class="grid grid-cols-2 sm:grid-cols-2 md:grid-cols-3 gap-4">

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">CEP</label>
          <input formControlName="cep" type="text" mask="00000-000" (blur)="buscarCep()"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div class="col-span-2 md:col-span-2">
          <label class="block text-gray-600 font-medium mb-1 text-sm">Logradouro</label>
          <input formControlName="logradouro" type="text"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Número</label>
          <input formControlName="numero" type="text"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Bairro</label>
          <input formControlName="bairro" type="text"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Cidade</label>
          <input formControlName="cidade" type="text"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm" />
        </div>

        <div>
          <label class="block text-gray-600 font-medium mb-1 text-sm">Estado (UF)</label>
          <input formControlName="estado" maxlength="2" type="text"
            class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-400 text-sm uppercase" />
        </div>

      </div>
    </div>

    <!-- ================= BOTÕES ================= -->
    <div class="flex flex-col-reverse md:flex-row justify-end gap-3 pt-4 border-t">
      <button type="button" routerLink="/credenciados"
        class="px-5 py-3 bg-gray-400 text-white rounded-lg hover:bg-gray-500 transition text-sm w-full md:w-auto">
        Cancelar
      </button>
      <button type="submit"
        class="px-5 py-3 bg-green-600 text-white font-semibold rounded-lg shadow hover:bg-green-700 transition text-sm w-full md:w-auto">
        <i class="fa-solid fa-floppy-disk mr-1"></i> Salvar Credenciado
      </button>
    </div>

  </form>

</div>
