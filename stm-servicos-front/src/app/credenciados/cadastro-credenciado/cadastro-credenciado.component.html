<div class="p-6 max-w-5x1 mx-auto bg-white shadow-lg rounded-lg mt-6">

  <h2 class="text-2x1 font-semibold text-gray-700 mb-4">Novo Credenciado</h2>
  <hr class="mb-4">

  <form [formGroup]="camposForm" (ngSubmit)="salvar()">

    <!-- RAG -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">RAG</label>
      <input type="text" formControlName="rag" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
    </div>

    <!-- Tipo Pessoa -->
    <div class="mb-4">
      <label class="block text-gray-600 font-medium mb-2">Tipo de Pessoa</label>
      <select formControlName="tipoPessoa" class="w-full p-3 border border-gray-300 rounded shadow-sm">
        <option [ngValue]="null">Selecione</option>
        <option [ngValue]="1">Pessoa Física</option>
        <option [ngValue]="2">Pessoa Jurídica</option>
      </select>

    </div>

    <!-- CPF / CNPJ -->
    <div class="mb-4" *ngIf="tipoPessoaSelecionado">
      <label class="block text-gray-600 font-medium mb-2">
        {{ tipoPessoaSelecionado === 1 ? 'CPF' : 'CNPJ' }}
      </label>

      <input type="text" formControlName="numeroPessoa"
        [mask]="tipoPessoaSelecionado === 1 ? '000.000.000-00' : '00.000.000/0000-00'"
        class="w-full p-3 border border-gray-300 rounded shadow-sm" />
    </div>

    <!-- Valores -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-600 font-medium mb-2">Valor Chamado</label>
        <input type="text" formControlName="valorChamado" mask="separator.2" thousandSeparator="." decimalMarker=","
          class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Valor KM</label>
        <input type="text" formControlName="valorKm" mask="separator.2" thousandSeparator="." decimalMarker=","
          class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>
    </div>

    <!-- Quantidade + Contato -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-600 font-medium mb-2">Qtd. OS Atendidas</label>
        <input type="number" formControlName="quantidadeOSAtendidas"
          class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Contato</label>
        <input type="text" formControlName="contato" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>
    </div>

    <!-- Telefones + Email -->
    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="block text-gray-600 font-medium mb-2">Telefone</label>
        <input type="text" mask="(00) 00000-0000" formControlName="telefones" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">E-mail</label>
        <input type="email" formControlName="email" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>
    </div>

    <!-- ENDEREÇO -->
    <h3 class="text-xl font-semibold text-gray-700 mt-6 mb-2">Endereço</h3>

    <div class="grid grid-cols-3 gap-4 mb-4">
      <div>
        <label class="block text-gray-600 font-medium mb-2">CEP</label>
        <input formControlName="cep" type="text" mask="00000-000"
          class="w-full p-3 border border-gray-300 rounded shadow-sm" (blur)="buscarCep()" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Logradouro</label>
        <input formControlName="logradouro" type="text" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Número</label>
        <input formControlName="numero" type="text" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Bairro</label>
        <input formControlName="bairro" type="text" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Cidade</label>
        <input formControlName="cidade" type="text" class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>

      <div>
        <label class="block text-gray-600 font-medium mb-2">Estado (UF)</label>
        <input formControlName="estado" maxlength="2" type="text"
          class="w-full p-3 border border-gray-300 rounded shadow-sm" />
      </div>
    </div>

    <button type="submit" class="w-full bg-green-600 text-white font-semibold p-3 rounded shadow hover:bg-green-700">
      Salvar Credenciado
    </button>

  </form>
</div>
