<div class="p-6 max-w-7x1 mx-auto bg-white shadow-lg rounded-lg mt-6">

  <!-- Cabeçalho -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-2x1 font-semibold text-gray-700">Credenciados Cadastrados</h2>

    <button routerLink="/credenciados/cadastro"
      class="px-4 py-2 bg-green-600 text-white rounded-lg shadow hover:bg-green-700">
      + Novo Credenciado
    </button>
  </div>

  <hr class="mb-4">

  <!-- Tabela -->
  <div class="px-4">
    <div class="overflow-x-auto">
      <table class="min-w-full border-collapse table-fixed">

        <thead class="bg-gray-100 text-gray-700">
          <tr class="h-12">
            <th class="p-3 border text-center w-[90px]">Código</th>
            <th class="p-3 border text-center min-w-[200px]">RAG</th>
            <th class="p-3 border text-center w-[180px]">CPF / CNPJ</th>
            <th class="p-3 border text-center w-[70px]">UF</th>
            <th class="p-3 border text-center min-w-[180px]">Cidade</th>
            <th class="p-3 border text-center w-[100px]">Técnicos</th>
            <th class="p-3 border text-center w-[100px]">Ações</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let c of credenciados" class="hover:bg-gray-50 h-12 cursor-pointer hover:ring-1 hover:ring-blue-300"
            (click)="irParaTecnicos(c.id)">

            <td class="p-3 border text-center truncate">
              {{ c.codigo }}
            </td>

            <td class="p-3 border text-center truncate">
              {{ c.rag }}
            </td>

            <td class="p-3 border text-center truncate">
              {{ c.numeroPessoa }}
            </td>

            <td class="p-3 border text-center truncate">
              {{ c.endereco?.estado }}
            </td>

            <td class="p-3 border text-center truncate">
              {{ c.endereco?.cidade }}
            </td>

            <td class="p-3 border text-center">
              {{ c.tecnicos?.length || 0 }}
            </td>

            <td class="p-3 border">
              <div class="flex justify-center gap-2">
                <button class="w-9 h-9 flex items-center justify-center rounded hover:bg-gray-200"
                  (click)="editar(c.id); $event.stopPropagation()">
                  <i class="fa-solid fa-pen-to-square text-blue-600"></i>
                </button>

                <button class="w-9 h-9 flex items-center justify-center rounded hover:bg-gray-200"
                  (click)="excluir(c.id); $event.stopPropagation()">
                  <i class="fa-solid fa-trash text-red-600"></i>
                </button>
              </div>
            </td>

          </tr>
        </tbody>

      </table>
    </div>
  </div>

  <!-- Paginação -->
  <div class="mt-6 flex justify-center items-center gap-4">

    <button (click)="paginaAnterior()" [disabled]="page === 0"
      class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 disabled:opacity-40">
      Anterior
    </button>

    <span class="text-gray-700 font-medium">
      Página {{ page + 1 }} de {{ totalPages }}
    </span>

    <button (click)="proximaPagina()" [disabled]="(page + 1) >= totalPages"
      class="px-4 py-2 bg-blue-600 text-white rounded shadow hover:bg-blue-700 disabled:opacity-40">
      Próxima
    </button>

  </div>

</div>
